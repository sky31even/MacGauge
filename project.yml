name: MacGauge
options:
  bundleIdPrefix: com.even
  deploymentTarget:
    macOS: "15.0"
settings:
  base:
    SWIFT_VERSION: "5.0"
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_INJECT_BASE_ENTITLEMENTS: "NO"
    CODE_SIGN_IDENTITY: "Apple Development"
    DEVELOPMENT_TEAM: DTP938ZW35
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
targets:
  MacGauge:
    type: application
    platform: macOS
    sources:
      - App
      - Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.even.MacGauge
        INFOPLIST_FILE: App/Info.plist
        SWIFT_OBJC_BRIDGING_HEADER: App/Bridging/MacGauge-Bridging-Header.h
